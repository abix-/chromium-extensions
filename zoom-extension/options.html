<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Zoom & Pan - Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   system-ui, sans-serif;
      max-width: 520px;
      margin: 18px;
      color: #222;
      line-height: 1.5;
    }
    h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
    .tagline { color: #666; margin: 0 0 18px; font-size: 13px; }
    .row {
      padding: 12px 14px;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .row label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
    }
    .row input[type="checkbox"] { margin-top: 3px; }
    .row .title { font-size: 14px; font-weight: 500; }
    .row .help {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      line-height: 1.45;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #1a5d2a;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <h1>YouTube Zoom & Pan</h1>
  <p class="tagline">Zoom with <b>Shift+Alt+Mousewheel</b>.
    Pan by moving the mouse while holding Shift+Alt.</p>

  <div class="row">
    <label>
      <input type="checkbox" id="block-preview-scroll">
      <div>
        <div class="title">Block YouTube's scroll-to-preview on thumbnails</div>
        <div class="help">
          YouTube uses the mouse wheel to scrub video previews when
          you hover over a thumbnail. This overrides normal page
          scrolling. Enable this to intercept the behavior so the
          wheel scrolls the page as usual. Zoom via Shift+Alt still
          works.
        </div>
      </div>
    </label>
  </div>

  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
